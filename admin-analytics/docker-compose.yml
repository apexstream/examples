# Standalone: ./client only.
#
#   cd examples/admin-analytics
#   cp client/.env.example client/.env
#   docker compose up
#
# UI: http://localhost:5177
# If API runs on the host, add to client/.env:
#   VITE_CONTROL_PLANE_PROXY_TARGET=http://host.docker.internal:8080
services:
  admin-analytics-client:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev"
    ports:
      - "5177:5177"
    volumes:
      - ./client:/app
      - admin_analytics_client_node_modules:/app/node_modules
    env_file:
      - ./client/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      CHOKIDAR_USEPOLLING: "true"

volumes:
  admin_analytics_client_node_modules:
