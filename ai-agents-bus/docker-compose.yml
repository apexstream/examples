# Standalone: ./client only. Vite proxies /api/ollama — set OLLAMA_PROXY_TARGET so the
# dev server (inside the container) reaches Ollama on the host.
#
#   cd examples/ai-agents-bus
#   cp client/.env.example client/.env
#   docker compose up
#
# UI: http://localhost:5178
services:
  ai-agents-bus-client:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev"
    ports:
      - "5178:5178"
    volumes:
      - ./client:/app
      - ai_agents_client_node_modules:/app/node_modules
    env_file:
      - ./client/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      OLLAMA_PROXY_TARGET: http://host.docker.internal:11434

volumes:
  ai_agents_client_node_modules:
