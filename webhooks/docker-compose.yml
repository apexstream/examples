# Standalone: ./client + ./mock-server (no repo-root workspace).
#
#   cd examples/webhooks
#   cp client/.env.example client/.env
#   docker compose up
#
# UI: http://localhost:5175 · Mock: http://localhost:8787
# If Control Plane runs on the host, set in client/.env:
#   VITE_CONTROL_PLANE_PROXY_TARGET=http://host.docker.internal:8080
services:
  webhooks-client:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev"
    ports:
      - "5175:5175"
    volumes:
      - ./client:/app
      - webhooks_client_node_modules:/app/node_modules
    env_file:
      - ./client/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      CHOKIDAR_USEPOLLING: "true"

  webhooks-mock:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm start"
    ports:
      - "8787:8787"
    volumes:
      - ./mock-server:/app
      - webhooks_mock_node_modules:/app/node_modules

volumes:
  webhooks_client_node_modules:
  webhooks_mock_node_modules:
