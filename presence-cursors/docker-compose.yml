# Standalone: ./client only.
#
#   cd examples/presence-cursors
#   cp client/.env.example client/.env
#   docker compose up
#
# UI: http://localhost:5176
services:
  presence-cursors-client:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev"
    ports:
      - "5176:5176"
    volumes:
      - ./client:/app
      - presence_cursors_client_node_modules:/app/node_modules
    env_file:
      - ./client/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"

volumes:
  presence_cursors_client_node_modules:
